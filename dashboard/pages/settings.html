<section class="content setting-page">
    <div class="container_setting">
        <div class="header_setting">
            <h1>Settings</h1>                    
        </div>
        <hr>
        <div class="setting_form">
            <form>
                <div class="form-group">
                    <label for="site-name">Site Name</label>
                    <input type="text" id="site-name" name="site-name" />
                </div>
                <div class="form-group">
                    <label for="support-email">Support Email</label>
                    <input type="email" id="support-email" name="support-email" />
                </div>
                <div class="form-group">
                    <label for="monthly-order-goal">Monthly Order Goal</label>
                    <input type="text" id="monthly-order-goal" name="monthly-order-goal" />
                </div>
                
                <button type="submit">Save Settings</button>
            </form>
        </div>
    </div>
</section>
